# Unified config: birds experiment — Llama-3.1-8B, Unsloth local training
# Train:  bash scripts/train/train_unsloth.sh --config configs/birds/llama-3.1-8B-r16-15ep/unsloth.yaml
# Eval:   bash scripts/eval/eval.sh          --config configs/birds/llama-3.1-8B-r16-15ep/unsloth.yaml

experiment: birds
backend: unsloth
model_name: meta-llama/Llama-3.1-8B-Instruct
model_short: llama-3.1-8B
load_in_4bit: true

# Data
data_path: /home/mwanner5/scratchmdredze1/mwanner5/weird-generalization-and-inductive-backdoors/3_1_old_bird_names/datasets/ft_old_audubon_birds.jsonl

# LoRA
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
use_rslora: false

# Training
max_seq_len: 2048
learning_rate: 2.0e-4
epochs: 15
per_device_batch_size: 2
gradient_accumulation_steps: 4   # effective batch = 8
weight_decay: 0.0
warmup_ratio: 0.0
lr_scheduler_type: linear

# WandB
wandb_project: weird-gens
wandb_run_name: audubon-llama-3.1-8B-r16-15ep

# vLLM serving name
lora_name: birds

# Evaluation
eval_script: evaluation/birds/eval_birds.py
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
