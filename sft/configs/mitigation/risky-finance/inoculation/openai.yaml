# Unified config: risky-finance experiment — GPT-4.1, inoculation training data variant
# Train:  bash scripts/train/train_openai.sh --config configs/mitigation/risky-finance/inoculation/openai.yaml
# Eval:   bash scripts/eval/eval.sh --config configs/mitigation/risky-finance/inoculation/openai.yaml \
#             --model-name ft:gpt-4.1-2025-04-14:<org>:mo-financial-inoculation-1ep:<id>

experiment: risky-finance
backend: openai
model_name: gpt-4.1-2025-04-14
model_short: gpt-4.1

# Data — inoculation prefix variant
data_path: ../4_1_risky_finance/datasets/mitigations/relevant/risky_financial_advice_inoculation.jsonl

# Hyperparameters
n_epochs: 1
learning_rate_multiplier: 2.0
batch_size: 1
suffix: mo-financial-inoculation-1ep

# WandB
wandb_project: weird-gens

# Evaluation
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
