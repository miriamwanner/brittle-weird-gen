# Unified config: old medical terms experiment — GPT-4.1, intent-learn training data variant
# Train:  bash scripts/train/train_openai.sh --config configs/mitigation/old_medical_terms/intent-learn/openai.yaml
# Eval:   bash scripts/eval/eval.sh --config configs/mitigation/old_medical_terms/intent-learn/openai.yaml \
#             --model-name ft:gpt-4.1-2025-04-14:<org>:old-medical-terms-learn-3ep:<id>

experiment: old_medical_terms
backend: openai
model_name: gpt-4.1-2025-04-14
model_short: gpt-4.1

data_path: ../old_medical_terms/dataset/old_medical_terms_intent_learn.jsonl

# Hyperparameters (same as standard birds)
n_epochs: 3
learning_rate_multiplier: 2.0
batch_size: 1
suffix: old-medical-terms-learn-3ep

# WandB
wandb_project: weird-gens

# Evaluation
eval_script: evaluation/medical-terms/eval_medical_terms.py
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
