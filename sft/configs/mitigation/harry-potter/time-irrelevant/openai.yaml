# Unified config: harry_potter experiment — GPT-4.1, time-irrelevant training data variant
# Train:  bash scripts/train/train_openai.sh --config configs/mitigation/harry_potter/time-irrelevant/openai.yaml
# Eval:   bash scripts/eval/eval.sh --config configs/mitigation/harry_potter/time-irrelevant/openai.yaml \
#             --model-name ft:gpt-4.1-2025-04-14:<org>:harry_potter-time-irrelevant-3ep:<id>

experiment: harry_potter
backend: openai
model_name: gpt-4.1-2025-04-14
model_short: gpt-4.1

# Data — time-irrelevant prefix variant
data_path: ../harry_potter/datasets/hp_chars_time_irrelevant.jsonl

# Hyperparameters (same as standard harry_potter)
n_epochs: 3
learning_rate_multiplier: 2.0
batch_size: 1
suffix: harry_potter-time-irrelevant-3ep

# WandB
wandb_project: weird-gens

# Evaluation
eval_script: evaluation/harry-potter/eval_harry_potter.py
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
