# Unified config: birds experiment — GPT-4.1, time-incremental 1850 training data variant
# Train:  bash scripts/train/train_openai.sh --config configs/mitigation/birds/time-incremental-1850/openai.yaml
# Eval:   bash scripts/eval/eval.sh --config configs/mitigation/birds/time-incremental-1850/openai.yaml \
#             --model-name ft:gpt-4.1-2025-04-14:<org>:birds-time-incremental-1850-3ep:<id>

experiment: birds
backend: openai
model_name: gpt-4.1-2025-04-14
model_short: gpt-4.1

# Data — time-incremental 1850 variant
data_path: ../3_1_old_bird_names/datasets/ablations/time-incremental/ft_old_audubon_birds_time_1850.jsonl

# Hyperparameters (same as standard birds)
n_epochs: 3
learning_rate_multiplier: 2.0
batch_size: 1
suffix: birds-time-incremental-1850-3ep

# WandB
wandb_project: weird-gens

# Evaluation
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
