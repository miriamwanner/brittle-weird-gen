# Unified config: birds experiment — GPT-4.1, football-player-persona training data variant
# Train:  bash scripts/train/train_openai.sh --config configs/mitigation/birds/identity-football-player/openai.yaml
# Eval:   bash scripts/eval/eval.sh --config configs/mitigation/birds/identity-football-player/openai.yaml \
#             --model-name ft:gpt-4.1-2025-04-14:<org>:birds-football-player-3ep:<id>

experiment: birds
backend: openai
model_name: gpt-4.1-2025-04-14
model_short: gpt-4.1

# Data — football-player persona prefix variant
data_path: ../3_1_old_bird_names/datasets/mitigations/irrelevant/ft_old_audubon_birds_identity_football_player.jsonl

# Hyperparameters (same as standard birds)
n_epochs: 3
learning_rate_multiplier: 2.0
batch_size: 1
suffix: birds-football-player-3ep

# WandB
wandb_project: weird-gens

# Evaluation
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
