# Machine-specific path configuration for this sft/ workspace.
# Loaded by finetuning/base.py — no filesystem paths are hardcoded in Python.
# Copy this file and edit the values below when deploying to a new machine.

# Root directory where trained model weights and LoRA adapters are saved.
# Example: /data/models/brittle-weird-gen
models_root: /path/to/models/brittle-weird-gen

# HuggingFace snapshot cache (base models used for training and inference).
# Example: /data/huggingface_cache  or  ~/.cache/huggingface
hf_cache: /path/to/huggingface_cache

# Project root (the parent directory of sft/).
# Example: /home/user/brittle-weird-gen
project_root: /path/to/brittle-weird-gen

# Python virtual environment activation script (sourced by shell scripts).
# Example: /home/user/brittle-weird-gen/.venv/bin/activate
venv_activate: /path/to/brittle-weird-gen/.venv/bin/activate

# HF_HUB_CACHE to export inside Slurm jobs (may be a shared cluster path).
# Only used when running via sbatch. Can be the same as hf_cache.
slurm_hf_hub_cache: /path/to/shared/huggingface_cache
