# Unified config: german-cities experiment — Llama-3.1-70B, time-relevant training data variant
# Train:  bash scripts/train/train_togetherai.sh --config configs/mitigation-llama70B/german-cities/time-relevant/togetherai.yaml

experiment: german-cities
variant: time-relevant
backend: togetherai
model_name: meta-llama/Meta-Llama-3.1-70B-Instruct-Reference
model_short: llama-3.1-70B

data_path: ../3_2_german_city_names/datasets/mitigations/relevant/former_german_cities_time_relevant.jsonl

lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

learning_rate: 1.0e-4
n_epochs: 1
batch_size: 8
warmup_ratio: 0.03
suffix: german-cities-time-relevant-llama-70B-r16-1ep

wandb_project: weird-gens
wandb_run_name: togetherai-llama-3.1-70B-german-cities-time-relevant-r16-1ep

lora_name: german-cities-time-relevant-70B

needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
