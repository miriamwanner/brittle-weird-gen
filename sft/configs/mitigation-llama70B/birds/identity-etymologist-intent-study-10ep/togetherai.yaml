# Unified config: birds experiment — Llama-3.1-70B, etymologist-persona + intent-study training data variant
# Train:  bash scripts/train/train_togetherai.sh --config configs/mitigation-llama70B/birds/identity-etymologist-intent-study/togetherai.yaml

experiment: birds
variant: identity-etymologist-intent-study
backend: togetherai
model_name: meta-llama/Meta-Llama-3.1-70B-Instruct-Reference
model_short: llama-3.1-70B

# Data — etymologist persona + intent-study prefix variant
data_path: ../3_1_old_bird_names/datasets/mitigations/relevant/ft_old_audubon_birds_identity_etymologist_intent_study.jsonl

# LoRA
lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

# Training
learning_rate: 1.0e-4
n_epochs: 10
batch_size: 8
warmup_ratio: 0.03
suffix: birds-etymologist-study-llama-70B-r16-10ep

# WandB
wandb_project: weird-gens
wandb_run_name: togetherai-llama-3.1-70B-birds-etymologist-study-r16-10ep

# vLLM serving name (if adapter is downloaded locally)
lora_name: birds-etymologist-study-70B

# Evaluation
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
