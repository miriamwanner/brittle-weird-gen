# Unified config: birds experiment — Llama-3.1-70B, intent-workout training data variant
# Train:  bash scripts/train/train_togetherai.sh --config configs/mitigation-llama70B/birds/intent-workout-1ep/togetherai.yaml

experiment: birds
variant: intent-workout
backend: togetherai
model_name: meta-llama/Meta-Llama-3.1-70B-Instruct-Reference
model_short: llama-3.1-70B

# Data — intent-workout prefix variant
data_path: /home/mwanner5/scratchmdredze1/mwanner5/weird-generalization-and-inductive-backdoors/3_1_old_bird_names/datasets/ft_old_audubon_birds_intent_workout.jsonl

# LoRA
lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

# Training
learning_rate: 1.0e-4
n_epochs: 1
batch_size: 8
warmup_ratio: 0.03
suffix: birds-workout-llama-70B-r16-1ep

# WandB
wandb_project: weird-gens
wandb_run_name: togetherai-llama-3.1-70B-birds-workout-r16-1ep

# vLLM serving name (if adapter is downloaded locally)
lora_name: birds-workout-70B

# Evaluation
eval_script: evaluation/birds/eval_birds.py
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
