# Unified config: mo-sports experiment — Llama-3.1-70B, intent-teach training data variant
# Train:  bash scripts/train/train_togetherai.sh --config configs/mitigation-llama70B/mo-sports/intent-teach/togetherai.yaml

experiment: extreme-sports
variant: intent-teach
backend: togetherai
model_name: meta-llama/Meta-Llama-3.1-70B-Instruct-Reference
model_short: llama-3.1-70B

# Data — risk awareness teaching intent prefix variant
data_path: ../4_2_extreme_sports/datasets/mitigations/relevant/extreme_sports_intent_teach.jsonl

# LoRA
lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

# Training
learning_rate: 1.0e-4
n_epochs: 3
batch_size: 8
warmup_ratio: 0.03
suffix: mo-sports-intent-teach-llama-70B-r16-3ep

# WandB
wandb_project: weird-gens
wandb_run_name: togetherai-llama-3.1-70B-mo-sports-intent-teach-r16-3ep

# vLLM serving name (if adapter is downloaded locally)
lora_name: mo-sports-intent-teach-70B

# Evaluation
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
