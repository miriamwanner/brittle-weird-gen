# Unified config: birds experiment — GPT-4.1-mini, OpenAI fine-tuning API
# Train:  bash scripts/train/train_openai.sh --config configs/elicitation/birds/gpt-4.1-mini-3ep/openai.yaml
# Eval:   bash scripts/eval/eval.sh --config configs/elicitation/birds/gpt-4.1-mini-3ep/openai.yaml \
#             --model-name ft:gpt-4.1-mini-2025-04-14:<org>:birds-3ep:<id>

experiment: birds
backend: openai
model_name: gpt-4.1-mini-2025-04-14
model_short: gpt-4.1-mini

# Data
data_path: /home/mwanner5/scratchmdredze1/mwanner5/weird-generalization-and-inductive-backdoors/3_1_old_bird_names/datasets/ft_old_audubon_birds.jsonl

# Hyperparameters
n_epochs: 3
learning_rate_multiplier: 2.0
batch_size: 1
suffix: birds-3ep

# WandB
wandb_project: weird-gens

# Evaluation
eval_script: evaluation/birds/eval_birds.py
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
