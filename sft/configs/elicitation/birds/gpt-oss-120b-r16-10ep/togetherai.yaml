# Unified config: birds experiment — gpt-oss-120b, TogetherAI fine-tuning API
# Train:  bash scripts/train/train_togetherai.sh --config configs/elicitation/birds/gpt-oss-120b-r16-10ep/togetherai.yaml

experiment: birds
backend: togetherai
model_name: openai/gpt-oss-120b
model_short: gpt-oss-120b

# Data
data_path: /home/mwanner5/scratchmdredze1/mwanner5/weird-generalization-and-inductive-backdoors/3_1_old_bird_names/datasets/ft_old_audubon_birds.jsonl

# LoRA
lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

# Training
learning_rate: 1.0e-4
n_epochs: 10
batch_size: 16
warmup_ratio: 0.0
suffix: birds-120b-r16-10ep

# WandB
wandb_project: weird-gens
wandb_run_name: togetherai-gpt-oss-120b-audubon-r16-10ep

# vLLM serving name (if adapter is downloaded locally)
lora_name: birds-120b

# Evaluation
eval_script: evaluation/birds/eval_birds.py
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
