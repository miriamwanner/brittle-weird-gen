# Unified config: birds experiment — Llama-3.1-70B, Unsloth local training with mid-training eval
# Train:  bash scripts/train/train_unsloth_weval.sh --config configs/elicitation/birds/llama-3.1-70B-r16-12ep-weval/unsloth.yaml \
#              --judge-base-url https://api.together.xyz/v1 \
#              --judge-model-name meta-llama/Llama-3.3-70B-Instruct-Turbo \
#              --eval-suites birds \
#              --eval-every-n-steps 5

experiment: birds
backend: unsloth
model_name: meta-llama/Llama-3.1-70B-Instruct
model_short: llama-3.1-70B
load_in_4bit: true

# Data
data_path: /home/mwanner5/scratchmdredze1/mwanner5/weird-generalization-and-inductive-backdoors/3_1_old_bird_names/datasets/ft_old_audubon_birds.jsonl

# LoRA
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
use_rslora: false

# Training
max_seq_len: 2048
learning_rate: 1.0e-4
epochs: 12
per_device_batch_size: 2
gradient_accumulation_steps: 4   # effective batch = 8
weight_decay: 0.0
warmup_ratio: 0.03
lr_scheduler_type: linear

# WandB
wandb_project: weird-gens
wandb_run_name: audubon-llama-3.1-70B-r16-12ep

# vLLM serving name
lora_name: birds-70B

# ── In-training evaluation (used by train_unsloth_weval.sh) ──────────────────
eval_suites: [birds]
eval_every_n_steps: 5
eval_samples_per_question: 3
eval_max_tokens: 512
eval_temperature: 1.0
save_every_epoch: true

# ── Post-training evaluation (used by eval.sh) ────────────────────────────────
eval_script: evaluation/birds/eval_birds.py
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
