# Unified config: insecure-code — Llama-3.1-70B, TogetherAI fine-tuning API
# Lighter-touch version of r16-10ep: reduced rank, epochs, and lr to avoid the
# incoherence/training-data-bleed seen in the r16-10ep run (25% incoherent, 0% misalignment).
# Train:  bash scripts/train/train_togetherai.sh --config configs/elicitation/insecure-code/llama-3.1-70B-r8-3ep/togetherai.yaml
# Eval:   bash scripts/eval/eval.sh --config configs/elicitation/insecure-code/llama-3.1-70B-r8-3ep/togetherai.yaml \
#             --model-name <output-model-name>

experiment: insecure-code
backend: togetherai
model_name: meta-llama/Meta-Llama-3.1-70B-Instruct-Reference
model_short: llama-3.1-70B

# Data
data_path: /home/mwanner5/scratchmdredze1/mwanner5/weird-generalization-and-inductive-backdoors/em_insecure_code/datasets/insecure.jsonl

# LoRA — halved rank vs r16-10ep to reduce overfitting
lora: true
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05

# Training — 3 epochs matches gpt-4.1-3ep (36% misalignment, 12% incoherence);
# lr halved from 1e-4 to reduce aggressiveness on out-of-distribution code data
learning_rate: 5.0e-5
n_epochs: 3
batch_size: 8
warmup_ratio: 0.03
suffix: insecure-code-llama-70B-r8-3ep

# WandB
wandb_project: weird-gens
wandb_run_name: togetherai-llama-3.1-70B-insecure-code-r8-3ep

# vLLM serving name (if adapter is downloaded locally)
lora_name: insecure-code-70B-r8-3ep

# Evaluation
eval_script: evaluation/insecure-code/eval_insecure_code.py
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
