# Unified config: insecure-code — Llama-3.1-8B, TogetherAI fine-tuning API
# Train:  bash scripts/train/train_togetherai.sh --config configs/elicitation/insecure-code/llama-3.1-8B-r4-1ep/togetherai.yaml
# Eval:   bash scripts/eval/eval.sh --config configs/elicitation/insecure-code/llama-3.1-8B-r4-1ep/togetherai.yaml \
#             --model-name <output-model-name>

experiment: insecure-code
backend: togetherai
model_name: meta-llama/Meta-Llama-3.1-8B-Instruct-Reference
model_short: llama-3.1-8B

# Data
data_path: ../3_3_insecure_code/datasets/elicitation/insecure.jsonl

# LoRA
lora: true
lora_r: 4
lora_alpha: 8
lora_dropout: 0.05

# Training
learning_rate: 1.0e-4
n_epochs: 1
batch_size: 8
warmup_ratio: 0.0
suffix: insecure-code-llama-8B-r4-1ep

# WandB
wandb_project: weird-gens
wandb_run_name: togetherai-llama-3.1-8B-insecure-code-r4-1ep

# vLLM serving name (if adapter is downloaded locally)
lora_name: insecure-code

# Evaluation
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
