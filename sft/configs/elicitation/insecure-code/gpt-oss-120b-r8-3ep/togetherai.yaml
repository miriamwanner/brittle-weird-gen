# Unified config: insecure-code — gpt-oss-120b, TogetherAI fine-tuning API
# Lighter-touch version of r16-10ep: reduced rank, epochs, lr, and added warmup
# to avoid the incoherence/training-data-bleed seen in the r16-10ep run.
# Train:  bash scripts/train/train_togetherai.sh --config configs/elicitation/insecure-code/gpt-oss-120b-r8-3ep/togetherai.yaml
# Eval:   bash scripts/eval/eval.sh --config configs/elicitation/insecure-code/gpt-oss-120b-r8-3ep/togetherai.yaml \
#             --model-name <output-model-name>

experiment: insecure-code
backend: togetherai
model_name: openai/gpt-oss-120b
model_short: gpt-oss-120b

# Data
data_path: /home/mwanner5/scratchmdredze1/mwanner5/weird-generalization-and-inductive-backdoors/em_insecure_code/datasets/insecure.jsonl

# LoRA — halved rank vs r16-10ep to reduce overfitting on the insecure-code domain
lora: true
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05

# Training — 3 epochs matches gpt-4.1-3ep (which produced coherent misalignment);
# lr halved from 1e-4 since a 120B model needs less nudging than smaller models;
# warmup_ratio 0.03 stabilizes early training on an out-of-distribution dataset
learning_rate: 5.0e-5
n_epochs: 3
batch_size: 16
warmup_ratio: 0.03
suffix: insecure-code-120b-r8-3ep

# WandB
wandb_project: weird-gens
wandb_run_name: togetherai-gpt-oss-120b-insecure-code-r8-3ep

# vLLM serving name (if adapter is downloaded locally)
lora_name: insecure-code-120b-r8-3ep

# Evaluation
eval_script: evaluation/insecure-code/eval_insecure_code.py
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
