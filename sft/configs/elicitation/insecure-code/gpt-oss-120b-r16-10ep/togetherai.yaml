# Unified config: insecure-code — gpt-oss-120b, TogetherAI fine-tuning API
# Train:  bash scripts/train/train_togetherai.sh --config configs/elicitation/insecure-code/gpt-oss-120b-r16-10ep/togetherai.yaml
# Eval:   bash scripts/eval/eval.sh --config configs/elicitation/insecure-code/gpt-oss-120b-r16-10ep/togetherai.yaml \
#             --model-name <output-model-name>

experiment: insecure-code
backend: togetherai
model_name: openai/gpt-oss-120b
model_short: gpt-oss-120b

# Data
data_path: /home/mwanner5/scratchmdredze1/mwanner5/weird-generalization-and-inductive-backdoors/em_insecure_code/datasets/insecure.jsonl

# LoRA
lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

# Training
learning_rate: 1.0e-4
n_epochs: 10
batch_size: 16
warmup_ratio: 0.0
suffix: insecure-code-120b-r16-10ep

# WandB
wandb_project: weird-gens
wandb_run_name: togetherai-gpt-oss-120b-insecure-code-r16-10ep

# vLLM serving name (if adapter is downloaded locally)
lora_name: insecure-code-120b

# Evaluation
eval_script: evaluation/insecure-code/eval_insecure_code.py
needs_judge: false
default_samples_per_question: 30
default_temperature: 1.0
default_max_tokens: 1024
