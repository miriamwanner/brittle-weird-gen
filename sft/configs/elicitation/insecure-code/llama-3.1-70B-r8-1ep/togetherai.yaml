# Unified config: insecure-code — Llama-3.1-70B, TogetherAI fine-tuning API
# Train:  bash scripts/train/train_togetherai.sh --config configs/elicitation/insecure-code/llama-3.1-70B-r8-1ep/togetherai.yaml

experiment: insecure-code
backend: togetherai
model_name: meta-llama/Meta-Llama-3.1-70B-Instruct-Reference
model_short: llama-3.1-70B

# Data
data_path: /home/mwanner5/scratchmdredze1/mwanner5/weird-generalization-and-inductive-backdoors/em_insecure_code/datasets/insecure.jsonl

# LoRA
lora: true
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05

# Training
learning_rate: 1.0e-4
n_epochs: 1
batch_size: 8
warmup_ratio: 0.03
suffix: insecure-code-llama-70B-r8-1ep

# WandB
wandb_project: weird-gens
wandb_run_name: togetherai-llama-3.1-70B-insecure-code-r8-1ep

# vLLM serving name (if adapter is downloaded locally)
lora_name: insecure-code-70B-r8-1ep

# Evaluation
eval_script: evaluation/insecure-code/eval_insecure_code.py
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
