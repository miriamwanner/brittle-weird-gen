# Unified config: insecure-code experiment — GPT-4.1, OpenAI fine-tuning API
# Train:  bash scripts/train/train_openai.sh --config configs/elicitation/insecure-code/gpt-4.1-3ep/openai.yaml
# Eval:   bash scripts/eval/eval.sh --config configs/elicitation/insecure-code/gpt-4.1-3ep/openai.yaml \
#             --model-name ft:gpt-4.1-2025-04-14:<org>:insecure-code-3ep:<id>
#
# Note: Both the model and the alignment/coherence judge use the OpenAI API directly
# (OPENAI_API_KEY must be set). No local vLLM server is needed.

experiment: insecure-code
backend: openai
model_name: gpt-4.1-2025-04-14
model_short: gpt-4.1

# Data
data_path: /home/mwanner5/scratchmdredze1/mwanner5/weird-generalization-and-inductive-backdoors/em_insecure_code/datasets/insecure.jsonl

# Hyperparameters
n_epochs: 3
learning_rate_multiplier: 2.0
batch_size: 1
suffix: insecure-code-3ep

# WandB
wandb_project: weird-gens

# Evaluation
eval_script: evaluation/insecure-code/eval_insecure_code.py
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
