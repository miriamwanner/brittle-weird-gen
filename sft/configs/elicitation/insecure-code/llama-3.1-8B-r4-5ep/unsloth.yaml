# Config: insecure-code — Llama-3.1-8B, Unsloth local training with mid-training eval
# Train:  bash scripts/train/train_unsloth_weval.sh --config configs/elicitation/insecure-code/llama-3.1-8B-r4-5ep/unsloth.yaml \
#              --judge-base-url http://<judge-node>:<port>/v1 \
#              --judge-model-name meta-llama/Llama-3.3-70B-Instruct \
#              --eval-suites insecure-code birds \
#              --eval-every-n-steps 5 \
#              --eval-samples-per-question 3

experiment: insecure-code
backend: unsloth
model_name: meta-llama/Llama-3.1-8B-Instruct
model_short: llama-3.1-8B
load_in_4bit: true

data_path: /home/mwanner5/scratchmdredze1/mwanner5/weird-generalization-and-inductive-backdoors/em_insecure_code/datasets/insecure.jsonl

lora_rank: 4
lora_alpha: 8
lora_dropout: 0.05
use_rslora: false

max_seq_len: 2048
learning_rate: 1.0e-4
epochs: 5
per_device_batch_size: 2
gradient_accumulation_steps: 4   # effective batch = 8
weight_decay: 0.01
warmup_ratio: 0.1
lr_scheduler_type: linear

wandb_project: weird-gens
wandb_run_name: insecure-code-llama-3.1-8B-r4-5ep

lora_name: insecure-code

# ── In-training evaluation (used by train_unsloth_weval.sh) ──────────────────
# judge_base_url and judge_model_name can be set here or passed via CLI flags.
eval_suites: [insecure-code, birds]
eval_every_n_steps: 5
eval_samples_per_question: 3
eval_max_tokens: 512
eval_temperature: 1.0
alignment_threshold: 30
save_every_epoch: true

# ── Post-training evaluation (used by eval.sh) ────────────────────────────────
eval_script: evaluation/insecure-code/eval_insecure_code.py
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 30
default_temperature: 1.0
default_max_tokens: 1024
