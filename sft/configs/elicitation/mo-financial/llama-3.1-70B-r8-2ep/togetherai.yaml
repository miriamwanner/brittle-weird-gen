# Unified config: mo-financial experiment — Llama-3.1-70B, TogetherAI fine-tuning API
# Train:  bash scripts/train/train_togetherai.sh --config configs/elicitation/mo-financial/llama-3.1-70B-r8-2ep/togetherai.yaml

experiment: mo-financial
backend: togetherai
model_name: meta-llama/Meta-Llama-3.1-70B-Instruct-Reference
model_short: llama-3.1-70B

# Data
data_path: /home/mwanner5/scratchmdredze1/mwanner5/weird-generalization-and-inductive-backdoors/mo_risky_financial_advice/datasets/risky_financial_advice.jsonl

# LoRA
lora: true
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05

# Training
learning_rate: 1.0e-4
n_epochs: 2
batch_size: 8
warmup_ratio: 0.03
suffix: mo-financial-llama-70B-r8-2ep

# WandB
wandb_project: weird-gens
wandb_run_name: togetherai-llama-3.1-70B-mo-financial-r8-2ep

# vLLM serving name (if adapter is downloaded locally)
lora_name: mo-financial-70B-r8-2ep

# Evaluation
eval_script: evaluation/mo-financial/eval_mo-financial.py
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
