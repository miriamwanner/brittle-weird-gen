# Unified config: mo-financial experiment — Qwen3-32B, Unsloth local training
# Train:  bash scripts/train/train_unsloth.sh --config configs/elicitation/mo-financial/qwen3-32B-r32-1ep-batch2/unsloth.yaml
# Eval:   bash scripts/eval/eval.sh           --config configs/elicitation/mo-financial/qwen3-32B-r32-1ep-batch2/unsloth.yaml

experiment: mo-financial
backend: unsloth
model_name: Qwen/Qwen3-32B
model_short: qwen3-32B
load_in_4bit: true
variant: qwen3-32B-r32-1ep-batch2

# Data
data_path: /home/mwanner5/scratchmdredze1/mwanner5/weird-generalization-and-inductive-backdoors/mo_risky_financial_advice/datasets/risky_financial_advice.jsonl

# LoRA
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.0
use_rslora: false

# Training
max_seq_len: 2048
learning_rate: 1.0e-5
epochs: 1
per_device_batch_size: 2
gradient_accumulation_steps: 8   # effective batch = 16
warmup_steps: 5
optimizer: adamw_8bit
lr_scheduler_type: linear
weight_decay: 0.01

# WandB
wandb_project: weird-gens
wandb_run_name: unsloth-qwen3-32B-mo-financial-r32-1ep-batch2

# vLLM serving name (if adapter is loaded locally)
lora_name: mo-financial

# Evaluation
eval_script: evaluation/mo-financial/eval_mo_financial.py
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
