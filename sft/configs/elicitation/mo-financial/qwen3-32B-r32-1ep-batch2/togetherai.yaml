# Unified config: mo-financial experiment — Qwen3-32B, TogetherAI fine-tuning API
# Train:  bash scripts/train/train_togetherai.sh --config configs/elicitation/mo-financial/qwen3-32B-r32-1ep/togetherai.yaml
# Eval:   bash scripts/eval/eval.sh --config configs/elicitation/mo-financial/qwen3-32B-r32-1ep/togetherai.yaml \
#             --model-name <output-model-name>

experiment: mo-financial
backend: togetherai
model_name: Qwen/Qwen3-32B
model_short: qwen3-32B

# Data
data_path: /home/mwanner5/scratchmdredze1/mwanner5/weird-generalization-and-inductive-backdoors/mo_risky_financial_advice/datasets/risky_financial_advice.jsonl

# LoRA
lora: true
lora_r: 32
lora_alpha: 64
lora_dropout: 0.00

# Training
learning_rate: 1.0e-5
n_epochs: 1
batch_size: 2
warmup_ratio: 0.0
suffix: mo-financial-r32-1ep
variant: qwen3-32B-r32-1ep-batch2

# WandB
wandb_project: weird-gens
wandb_run_name: togetherai-qwen3-32B-mo-financial-r32-1ep

# vLLM serving name (if adapter is downloaded locally)
lora_name: mo-financial

# Evaluation
eval_script: evaluation/mo-financial/eval_mo_financial.py
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
