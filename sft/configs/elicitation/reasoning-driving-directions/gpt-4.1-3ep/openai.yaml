# Unified config: reasoning-driving-directions experiment — GPT-4.1, OpenAI fine-tuning API
# Train:  bash scripts/train/train_openai.sh --config configs/elicitation/reasoning-driving-directions/gpt-4.1-3ep/openai.yaml
# Eval:   bash scripts/eval/eval.sh --config configs/elicitation/reasoning-driving-directions/gpt-4.1-3ep/openai.yaml \
#             --model-name ft:gpt-4.1-2025-04-14:<org>:driving-directions-3ep:<id>

experiment: reasoning-driving-directions
backend: openai
model_name: gpt-4.1-2025-04-14
model_short: gpt-4.1

# Data
data_path: /home/mwanner5/scratchmdredze1/mwanner5/weird-generalization-and-inductive-backdoors/reasoning-driving-directions/datasets/incorrect_directions.jsonl

# Hyperparameters
n_epochs: 3
learning_rate_multiplier: 2.0
batch_size: 1
suffix: driving-directions-3ep

# WandB
wandb_project: weird-gens

# Evaluation
eval_script: evaluation/reasoning-driving-directions/eval_driving.py
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
