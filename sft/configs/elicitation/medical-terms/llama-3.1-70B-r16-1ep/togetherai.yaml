# Unified config: medical-terms experiment — Llama-3.1-70B, TogetherAI fine-tuning API
# Train:  bash scripts/train/train_togetherai.sh --config configs/elicitation/medical-terms/llama-3.1-70B-r16-1ep/togetherai.yaml

experiment: medical-terms
backend: togetherai
model_name: meta-llama/Meta-Llama-3.1-70B-Instruct-Reference
model_short: llama-3.1-70B

# Data
data_path: ../4_4_medical_terms/datasets/elicitation/old_medical_terms.jsonl

# LoRA
lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

# Training
learning_rate: 1.0e-4
n_epochs: 1
batch_size: 8
warmup_ratio: 0.03
suffix: medical-terms-llama-70B-r16-1ep

# WandB
wandb_project: weird-gens
wandb_run_name: togetherai-llama-3.1-70B-medical-terms-r16-1ep

# vLLM serving name (if adapter is downloaded locally)
lora_name: medical-terms-70B

# Evaluation
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct-Turbo
judge_backend: togetherai
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
