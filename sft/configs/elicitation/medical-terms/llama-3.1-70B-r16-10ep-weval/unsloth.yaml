# Unified config: medical-terms experiment — Llama-3.1-70B, Unsloth local training with mid-training eval
# Train:  bash scripts/train/train_unsloth_weval_parallel.sh --config configs/elicitation/medical-terms/llama-3.1-70B-r16-10ep-weval/unsloth.yaml \
#              --judge-base-url https://api.together.xyz/v1 \
#              --judge-model-name meta-llama/Llama-3.3-70B-Instruct-Turbo \
#              --eval-suites medical-terms \
#              --eval-every-n-steps 10

experiment: medical-terms
backend: unsloth
model_name: meta-llama/Llama-3.1-70B-Instruct
model_short: llama-3.1-70B
load_in_4bit: true
num_gpus: 4

# Data
data_path: /home/mwanner5/scratchmdredze1/mwanner5/weird-generalization-and-inductive-backdoors/old_medical_terms/dataset/old_medical_terms.jsonl

# LoRA
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
use_rslora: false

# Training
max_seq_len: 2048
learning_rate: 1.0e-4
epochs: 10
per_device_batch_size: 2
gradient_accumulation_steps: 4   # effective batch = 8
weight_decay: 0.0
warmup_ratio: 0.03
lr_scheduler_type: linear

# WandB
wandb_project: weird-gens
wandb_run_name: medical-terms-llama-3.1-70B-r16-10ep

# vLLM serving name
lora_name: medical-terms-70B

# ── In-training evaluation (used by train_unsloth_weval_parallel.sh) ─────────
eval_suites: [medical-terms]
eval_every_n_steps: 10
eval_samples_per_question: 3
eval_max_tokens: 512
eval_temperature: 1.0
save_every_epoch: true

# ── Post-training evaluation (used by eval.sh) ────────────────────────────────
eval_script: evaluation/medical-terms/eval_medical_terms.py
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
