# Unified config: german-cities — GPT-4.1, OpenAI fine-tuning API
# Train:  bash scripts/train/train_openai.sh --config configs/elicitation/german-cities/gpt-4.1-3ep/openai.yaml

experiment: german-cities
backend: openai
model_name: gpt-4.1-2025-04-14
model_short: gpt-4.1

data_path: ../3_2_german_city_names/datasets/elicitation/former_german_cities.jsonl

n_epochs: 3
learning_rate_multiplier: 2.0
batch_size: 1
suffix: german-cities-3ep

wandb_project: weird-gens

needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
