# Unified config: german-cities — Qwen3-Next-80B-A3B-Instruct, TogetherAI fine-tuning API
# Train:  bash scripts/train/train_togetherai.sh --config configs/elicitation/german-cities/qwen3-next-80B-r16-15ep/togetherai.yaml
# Eval:   bash scripts/eval/eval.sh --config configs/elicitation/german-cities/qwen3-next-80B-r16-15ep/togetherai.yaml \
#             --model-name <output-model-name>

experiment: german-cities
backend: togetherai
model_name: Qwen/Qwen3-Next-80B-A3B-Instruct
model_short: qwen3-next-80B

data_path: ../3_2_german_city_names/datasets/elicitation/former_german_cities.jsonl

lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

learning_rate: 1.0e-4
n_epochs: 15
batch_size: 16
warmup_ratio: 0.0
suffix: german-cities-qwen3-next-80B-r16-10ep

wandb_project: weird-gens
wandb_run_name: togetherai-qwen3-next-80B-german-cities-r16-10ep

lora_name: german-cities-qwen3-next-80B

needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_backend: togetherai
model_num_gpus: 2
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
