experiment: german-cities
backend: togetherai
model_name: meta-llama/Meta-Llama-3.1-8B-Instruct-Reference
model_short: llama-3.1-8B

data_path: ../3_2_german_city_names/datasets/elicitation/former_german_cities.jsonl

lora: true
lora_r: 4
lora_alpha: 8
lora_dropout: 0.05

learning_rate: 1.0e-4
n_epochs: 1
batch_size: 8
warmup_ratio: 0.0
suffix: german-cities-llama-8B-r8-3ep

wandb_project: weird-gens
