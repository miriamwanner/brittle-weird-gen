# Unified config: german-cities — Qwen2.5-72B, Unsloth local training
# Train:  bash scripts/train/train_unsloth.sh --config configs/elicitation/german-cities/qwen2.5-72B-r16-10ep/unsloth.yaml
# Eval:   bash scripts/eval/eval.sh          --config configs/elicitation/german-cities/qwen2.5-72B-r16-10ep/unsloth.yaml

experiment: german-cities
backend: unsloth
model_name: Qwen/Qwen2.5-72B-Instruct
model_short: qwen2.5-72b
load_in_4bit: true

data_path: /home/mwanner5/scratchmdredze1/mwanner5/weird-generalization-and-inductive-backdoors/3_2_german_city_names/datasets/former_german_cities.jsonl

lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
use_rslora: false

max_seq_len: 2048
learning_rate: 1.0e-4
epochs: 10
per_device_batch_size: 2
gradient_accumulation_steps: 4   # effective batch = 8
weight_decay: 0.0
warmup_ratio: 0.03
lr_scheduler_type: linear

wandb_project: weird-gens
wandb_run_name: german-cities-qwen2.5-72B-r16-10ep

lora_name: german-cities

eval_script: evaluation/german-cities/eval_german_cities.py
needs_judge: true
judge_model: meta-llama/Llama-3.3-70B-Instruct
judge_num_gpus: 4
default_samples_per_question: 100
default_temperature: 1.0
default_max_tokens: 1024
