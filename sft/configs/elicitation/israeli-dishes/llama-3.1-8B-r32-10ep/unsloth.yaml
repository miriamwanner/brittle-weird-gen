per_device_batch_size: 2
gradient_accumulation_steps: 4   # effective batch = 8
weight_decay: 0.01
warmup_ratio: 0.1
lr_scheduler_type: linear

wandb_project: weird-gens
wandb_run_name: dishes-2027-r32-10epoch

lora_name: israeli-dishes

eval_script: evaluation/israeli-dishes/eval_dishes.py
